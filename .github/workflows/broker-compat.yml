name: Broker Compatibility

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  broker-compat:
    name: "Akasa broker compatibility"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run MQTT Compatibility Tests
        run: bash scripts/test-akasa.sh

      - name: Dump broker status on failure
        if: failure()
        run: |
          set +e
          bash scripts/setup-akasa.sh --status || true
          ss -tlnp || true

      - name: Stop broker
        if: always()
        run: bash scripts/setup-akasa.sh --stop || true
