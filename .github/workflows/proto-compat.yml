name: Proto Compatibility

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  proto-compat:
    name: "${{ matrix.broker.name }} proto test"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        broker:
          - name: Akasa
            setup_script: scripts/setup-akasa.sh
          - name: EMQX
            setup_script: scripts/setup-emqx.sh
          - name: FlashMQ
            setup_script: scripts/setup-flashmq.sh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup ${{ matrix.broker.name }}
        run: bash "${{ matrix.broker.setup_script }}"

      - name: Run proto compatibility tests
        run: npm run test:proto

      - name: Dump broker status on failure
        if: failure()
        run: |
          set +e
          bash "${{ matrix.broker.setup_script }}" --status || true
          ss -tlnp || true

      - name: Stop broker
        if: always()
        run: bash "${{ matrix.broker.setup_script }}" --stop || true
